# Public faculty-guide website on GitHub Pages:
#   https://nd-learning.github.io/FacultyOnboardingGuide/
#
# Runs ONLY on the ND-Learning/FacultyOnboardingGuide repo (the public face).
# Each night — after the live repo (jliu234-cell/odl-estimator) finishes its
# 11:30 UTC Asana refresh — this job fast-forwards this repo to match the live
# repo, then deploys faculty_guide/ to GitHub Pages. The sync commit also keeps
# the repo active so GitHub doesn't suspend the schedule.
#
# One-time setup (already done via API): repo Settings -> Pages -> Source =
# "GitHub Actions".
name: publish-pages

on:
  schedule:
    - cron: "45 12 * * *"   # 12:45 UTC, after the estimator's nightly refresh
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["faculty_guide/**", ".github/workflows/publish-pages.yml"]

permissions:
  contents: write            # to fast-forward this mirror to the live repo
  pages: write
  id-token: write

concurrency:
  group: publish-pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    if: github.repository == 'ND-Learning/FacultyOnboardingGuide'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward to the live repo (jliu234-cell/odl-estimator)
        run: |
          git remote add live https://github.com/jliu234-cell/odl-estimator.git
          git fetch live main
          if git merge --ff-only live/main; then
            # Push back so the mirror repo stays current. This is best-effort:
            # GITHUB_TOKEN cannot push commits that touch .github/workflows/**
            # ("refusing to allow a GitHub App to ... without workflows permission"),
            # which froze the site for a week in July 2026 when this push failure
            # killed the whole job. The runner already has the merged content, so
            # always deploy it; just warn if the mirror needs a manual push.
            git push origin main || echo "::warning::Could not push the sync commit back (likely a workflow-file change, which GITHUB_TOKEN may not push). Deploying the merged content anyway — run 'git push origin main' locally to catch the mirror up."
          else
            echo "::warning::Not fast-forwardable — this mirror has diverged from the live repo; deploying current contents."
          fi

      - name: Stage the public site
        run: |
          mkdir _site
          # Public/faculty-facing = the simple landing page (faculty_guide/start.html),
          # served at the root of https://nd-learning.github.io/FacultyOnboardingGuide/.
          cp faculty_guide/start.html _site/index.html
          touch _site/.nojekyll

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Encrypt the team estimator (StatiCrypt)
        # The detailed estimator is TEAM-ONLY (decided 2026-07-23). Its
        # self-contained nightly build (faculty_guide/canvas_upload/
        # ODL_Faculty_Onboarding_Guide.html — same file that goes to Canvas) is
        # published at /estimator.html encrypted with the team password, same
        # scheme as the PM dashboard (StatiCrypt AES-256 + PBKDF2, fixed salt so
        # "remember 30 days" survives nightly re-encryption). The raw estimator
        # source (index.html + estimator.js) is never published. If the
        # STATICRYPT_PASSWORD secret is missing, the estimator is simply not
        # published — the public landing still deploys.
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
          SALT: ${{ vars.STATICRYPT_SALT }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::warning::STATICRYPT_PASSWORD secret is not set — publishing the public landing only; /estimator.html is omitted."
            exit 0
          fi
          npm install --no-audit --no-fund --silent staticrypt@3.5.0 yargs@17.7.2
          ./node_modules/.bin/staticrypt "faculty_guide/canvas_upload/ODL_Faculty_Onboarding_Guide.html" \
            -d _out --password "$STATICRYPT_PASSWORD" --remember 30 \
            ${SALT:+--salt "$SALT"} \
            --template-title "ODL Estimator — team access" \
            --template-instructions "ODL team only. Enter the team password (ask your PM)." \
            --short
          cp _out/ODL_Faculty_Onboarding_Guide.html _site/estimator.html
          # belt-and-braces: plaintext must never reach the public site
          if grep -q "Interactive Process Guide" _site/estimator.html; then
            echo "::error::plaintext leaked into encrypted output"; exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
